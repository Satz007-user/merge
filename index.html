<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormy Beach Portrait</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Flash effect for lightning */
        @keyframes flash {
            0% { opacity: 0; }
            5% { opacity: 1; }
            10% { opacity: 0; }
            100% { opacity: 0; }
        }

        .flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .lightning-active {
            animation: flash 0.4s ease-out;
        }
    </style>
</head>
<body>

    <div id="flash" class="flash-overlay"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const flashDiv = document.getElementById('flash');

        let width, height;
        let rain = [];
        let waves = [];
        let lightningTimer = 0;
        
        // Configuration
        const RAIN_COUNT = 800;
        const WAVE_SEGMENTS = 60;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initRain();
            initWaves();
        }

        function initRain() {
            rain = [];
            for (let i = 0; i < RAIN_COUNT; i++) {
                rain.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    l: Math.random() * 20 + 10,
                    v: Math.random() * 15 + 10,
                    delay: Math.random() * 100
                });
            }
        }

        function initWaves() {
            waves = [];
            // Create 3 layers of waves
            for(let i=0; i<3; i++) {
                waves.push({
                    yOffset: height - 100 - (i * 80),
                    amplitude: 30 + (i * 20),
                    frequency: 0.005 + (i * 0.002),
                    speed: 0.02 + (i * 0.01),
                    offset: Math.random() * 100,
                    color: `rgba(10, 30, 50, ${0.4 + i*0.2})`,
                    foamColor: `rgba(200, 220, 255, ${0.1 + i*0.1})`
                });
            }
        }

        function drawSky() {
            // Gradient sky: Dark blue to black
            let gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#020205');
            gradient.addColorStop(0.6, '#0a0a15');
            gradient.addColorStop(1, '#050505');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Occasional Lightning
            if (Math.random() < 0.008) { // Random chance
                lightningTimer = 5; // Flash for 5 frames
                flashDiv.classList.add('lightning-active');
                setTimeout(() => flashDiv.classList.remove('lightning-active'), 400);
            }

            if (lightningTimer > 0) {
                ctx.fillStyle = `rgba(200, 220, 255, ${lightningTimer * 0.15})`;
                ctx.fillRect(0, 0, width, height);
                
                // Draw lightning bolt
                ctx.beginPath();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                let lx = width * 0.3 + Math.random() * width * 0.4;
                let ly = 0;
                ctx.moveTo(lx, ly);
                while (ly < height * 0.6) {
                    lx += (Math.random() - 0.5) * 40;
                    ly += Math.random() * 30 + 10;
                    ctx.lineTo(lx, ly);
                }
                ctx.stroke();
                lightningTimer--;
            }
        }

        function drawRain() {
            ctx.strokeStyle = "rgba(174, 194, 224, 0.4)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < RAIN_COUNT; i++) {
                let r = rain[i];
                // Update position
                r.y += r.v;
                r.x -= 2; // Wind blowing left

                // Reset if off screen
                if (r.y > height) {
                    r.y = -20;
                    r.x = Math.random() * width;
                }
                if (r.x < 0) r.x = width;

                ctx.moveTo(r.x, r.y);
                ctx.lineTo(r.x - 2, r.y + r.l);
            }
            ctx.stroke();
        }

        function drawWaves(time) {
            // Draw water and waves
            for (let i = 0; i < waves.length; i++) {
                let w = waves[i];
                ctx.fillStyle = w.color;
                ctx.beginPath();
                ctx.moveTo(0, height);
                
                for (let x = 0; x <= width; x += 5) {
                    // Aggressive wave calculation
                    let y = w.yOffset + 
                            Math.sin(x * w.frequency + time * w.speed + w.offset) * w.amplitude +
                            Math.sin(x * w.frequency * 2.5 + time * w.speed * 1.5) * (w.amplitude * 0.5);
                    
                    // Add "crashing" jaggedness for the front waves
                    if (i === 2) {
                         y += Math.random() * 5; // Turbulence
                    }

                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fill();

                // Draw white foam on top for the front wave
                if (i === 2) {
                    ctx.strokeStyle = w.foamColor;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let x = 0; x <= width; x += 10) {
                        let y = w.yOffset + 
                                Math.sin(x * w.frequency + time * w.speed + w.offset) * w.amplitude;
                        ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
            }
        }

        function drawPortraitSilhouette() {
            // Draw a dark silhouette of a person on the beach
            const cx = width / 2;
            const cy = height - 100;
            
            ctx.fillStyle = "#000";
            ctx.beginPath();
            // Head
            ctx.arc(cx, cy - 120, 25, 0, Math.PI * 2);
            // Body
            ctx.moveTo(cx - 20, cy - 95);
            ctx.quadraticCurveTo(cx - 40, cy - 40, cx - 30, cy);
            ctx.lineTo(cx - 20, cy + 100); // Legs
            ctx.lineTo(cx + 20, cy + 100);
            ctx.lineTo(cx + 30, cy);
            ctx.quadraticCurveTo(cx + 40, cy - 40, cx + 20, cy - 95);
            ctx.fill();

            // Optional: Add a faint glow around the silhouette from the lightning
            if (lightningTimer > 0) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = "rgba(200, 220, 255, 0.5)";
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        function animate(time) {
            ctx.clearRect(0, 0, width, height);
            
            drawSky();
            drawRain();
            drawWaves(time * 0.001);
            drawPortraitSilhouette();

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
